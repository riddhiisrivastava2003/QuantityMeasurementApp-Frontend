<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantity Measurement App - Signup/Login</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="image-section">
        <img src="assets/images/quantity.png" alt="Quantity Measurement">
        <p>Quantity Measurement</p>
      </div>
      <div class="form-section">
        <div class="tabs">
          <button id="loginTab">LOGIN</button>
          <button id="signupTab" class="active">SIGNUP</button>
        </div>
        <form id="signupForm">
          <input type="text" placeholder="Full Name" required>
          <input type="email" placeholder="Email Id" required>
          <input type="password" placeholder="Password" required>
          <input type="text" placeholder="Mobile Number" required>
          <button type="submit">Signup</button>
        </form>
        <form id="loginForm" style="display:none;">
          <input type="email" placeholder="Email Id" required>
          <input type="password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
